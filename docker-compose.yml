services:
  backend:
    build:
      context: ./server
    container_name: hj-events-backend
    env_file:
      - ./server/.env
    environment:
      PORT: 5000
      NODE_ENV: production
      CLIENT_URL: http://167.172.73.9:3010
      SERVER_URL: http://167.172.73.9:3010
      TRUST_PROXY: 0
      COOKIE_SECURE: "false"
    expose:
      - "5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
        VITE_BASE_PATH: /
    container_name: hj-events-frontend
    ports:
      - "3010:80"
    depends_on:
      - backend
    restart: unless-stopped
